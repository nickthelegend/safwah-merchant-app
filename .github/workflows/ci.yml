name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    name: lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit + integration tests (live-RPC suites auto-skip on CI)
        run: npm test
      - name: Production build
        run: npm run build
